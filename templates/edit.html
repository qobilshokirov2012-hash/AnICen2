<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Hikoyani tahrirlash</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="story-container">
        <h2 style="color: #ffd700; text-shadow: 0 0 5px #ffd700;">Hikoyani Tahrirlash</h2>
        <form method="POST">
            <input type="text" name="title" value="{{ story.title }}" required style="width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #00f3ff; color: white; border-radius: 5px;">
            <textarea name="content" required style="width: 100%; box-sizing: border-box; height: 300px; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #ffd700; color: white; border-radius: 5px;">{{ story.content }}</textarea>
            
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-neon-blue">Saqlash</button>
                <a href="/admin" class="btn-neon-red">Bekor qilish</a>
            </div>
        </form>
    </div>
</body>
</html>
