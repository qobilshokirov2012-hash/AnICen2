<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2.0">
</head>
<body>
    <div class="app-container">
        <header>
            <strong>Admin Panel</strong>
            <a href="/" style="text-decoration: none;">🏠</a>
        </header>
        
        <div class="content">
            <form method="POST" class="admin-form">
                <input type="text" name="title" placeholder="Sarlavha" required>
                <textarea name="content" placeholder="Hikoya matni..." rows="6" required></textarea>
                <button type="submit" style="background: var(--accent); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px;">Saqlash</button>
            </form>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

            {% for s in stories %}
            <div style="border-bottom: 1px solid var(--border); padding: 10px 0; display: flex; justify-content: space-between;">
                <span>{{ s.title }}</span>
                <div>
                    <a href="/story/{{ s['_id'] }}" style="color: var(--accent); margin-right: 10px;">Ko'rish</a>
                    <a href="/delete/{{ s['_id'] }}" style="color: red;">O'chirish</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
