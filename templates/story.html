<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ story.title_lat }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3.0">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="menu-icon">☰</div>
            <div class="nav-tools">
                <button class="btn-icon" id="langBtn" onclick="toggleLang()">Ўзбек</button>
                <button class="btn-icon" id="themeBtn" onclick="toggleTheme()">☀️</button>
                <div style="font-size: 20px; cursor: pointer;">⋮</div>
            </div>
        </header>

        <main class="content">
            <div id="lat-content">
                <h2>{{ story.title_lat }}</h2>
                <div class="story-text">{{ story.content_lat }}</div>
            </div>

            <div id="cyr-content" style="display: none;">
                <h2>{{ story.title_cyr }}</h2>
                <div class="story-text">{{ story.content_cyr }}</div>
            </div>
        </main>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (html.getAttribute('data-theme') === 'light') {
                html.setAttribute('data-theme', 'dark');
                btn.innerText = '🌙';
            } else {
                html.setAttribute('data-theme', 'light');
                btn.innerText = '☀️';
            }
        }

        function toggleLang() {
            const btn = document.getElementById('langBtn');
            const lat = document.getElementById('lat-content');
            const cyr = document.getElementById('cyr-content');

            if (btn.innerText === 'Ўзбек') {
                lat.style.display = 'none';
                cyr.style.display = 'block';
                btn.innerText = 'Lotin';
            } else {
                lat.style.display = 'block';
                cyr.style.display = 'none';
                btn.innerText = 'Ўзбек';
            }
        }
    </script>
</body>
</html>
