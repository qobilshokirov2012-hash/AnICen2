<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{{ story.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="story-container">
        <div class="menu-dots" onclick="copyLink()">⋮</div>
        
        <h1 style="color: #ffd700; text-shadow: 0 0 10px #ffd700;">{{ story.title }}</h1>
        <hr style="border-color: #333;">
        <p style="line-height: 1.8; white-space: pre-wrap;">{{ story.content }}</p>
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Hikoya havolasi nusxalandi!");
        }
    </script>
</body>
</html>
